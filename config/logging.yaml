version: 1

logger:
  level: "INFO"

  handlers:
    console:
      enabled: true
      level: "INFO"
      colorize: true
      format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"

    file:
      enabled: true
      level: "DEBUG"
      path: "logs/app_{time:YYYY-MM-DD}.log"
      format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
      rotation: "00:00"      # new file at midnight
      retention: "30 days"
      compression: "zip"

# Pipeline lifecycle events that must be logged at INFO level
pipeline_events:
  - data_loaded
  - cleaning_complete
  - validation_passed
  - validation_failed
  - enrichment_complete
  - analysis_complete
  - export_complete

